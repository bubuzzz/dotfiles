backend = "glx";
vsync = true;

blur:
{
  method = "dual_kawase";
  strength = 7;
  background = true;
  background-frame = false;
  background-fixed = false;
};

# Only blur behind rofi (the only transparent window); leave everything else alone
blur-background-exclude = [
  "class_g != 'Rofi'"
];

corner-radius = 0;
round-borders = 0;

opacity-rule = [
  "0:class_g = 'Qtile'"
];

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 0.5;

# Shadows and fading (optional)
shadow = false;
fading = false;

